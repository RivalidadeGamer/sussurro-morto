<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Jogo 2D – Noite que se repete</title>
  <style>
    body {
      margin: 0;
      background: #050509;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }
    h1 {
      margin: 10px 0 4px;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .info {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-align: center;
    }
    canvas {
      border: 2px solid #333;
      background: #11131a;
      box-shadow: 0 0 20px #000;
    }
    .msg {
      margin-top: 8px;
      font-size: 13px;
      text-align: center;
      white-space: pre-line;
      max-width: 700px;
    }
    .highlight { color: #ff4b4b; }
    .safe { color: #6fdc6f; }
  </style>
</head>
<body>
  <h1>Noite que se repete</h1>
  <div class="info">
    Movimentação: WASD ou Setas · Interagir: E<br>
    Explora a casa. Em algum momento, alguém vai bater à porta…
  </div>
  <canvas id="game" width="700" height="400"></canvas>
  <div class="msg" id="msg"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

const ROOM = {
  SALA: 'sala',
  COZINHA: 'cozinha',
  QUARTO: 'quarto'
};

let state = 'normal'; // normal, knock, chase, result
let currentRoom = ROOM.SALA;
let knockTimer = 0;
let enemyActive = false;

const player = { x: 120, y: 180, w: 16, h: 16, speed: 2.2 };
const enemy = { x: 600, y: 200, w: 18, h: 18, speed: 1.8 };

const door = { x: 650, y: 150, w: 30, h: 80 }; // porta na sala
const pcDesk = { x: 40, y: 60, w: 80, h: 40 }; // PC na sala

// Objetos do quarto
const bed = { x: 420, y: 70, w: 120, h: 40 };
const wardrobe = { x: 80, y: 60, w: 40, h: 90 };

// Portas entre divisões (simplificado)
const doorToCozinha = { x: 340, y: 0, w: 40, h: 10 }; // topo sala -> cozinha
const doorToSalaFromCozinha = { x: 340, y: 390, w: 40, h: 10 }; // baixo cozinha -> sala
const doorToQuarto = { x: 340, y: 390, w: 40, h: 10 }; // baixo sala -> quarto
const doorToSalaFromQuarto = { x: 340, y: 0, w: 40, h: 10 }; // topo quarto -> sala

function resetNight(message) {
  state = 'normal';
  currentRoom = ROOM.SALA;
  player.x = 120;
  player.y = 180;
  enemyActive = false;
  knockTimer = 0;
  if (message) msgEl.innerHTML = message;
  else msgEl.textContent = 'É outra vez a mesma noite. O PC está ligado na sala.';
}

resetNight('Explora a casa. Em algum momento, alguém vai bater à porta…');

function update() {
  handleInput();
  if (state === 'normal') {
    knockTimer += 1;
    if (knockTimer > 60 * 8) { // ~8 segundos
      startKnock();
    }
  } else if (state === 'chase' && enemyActive) {
    moveEnemy();
  }
}

function handleInput() {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  const len = Math.hypot(dx, dy) || 1;
  dx = dx / len * player.speed;
  dy = dy / len * player.speed;

  player.x += dx;
  player.y += dy;

  // Limites da sala
  if (player.x < 10) player.x = 10;
  if (player.y < 10) player.y = 10;
  if (player.x + player.w > canvas.width - 10) player.x = canvas.width - 10 - player.w;
  if (player.y + player.h > canvas.height - 10) player.y = canvas.height - 10 - player.h;

  // Troca de divisões
  if (currentRoom === ROOM.SALA && overlap(player, doorToCozinha) && player.y < 20) {
    currentRoom = ROOM.COZINHA;
    player.y = canvas.height - 40;
    msgEl.textContent = 'Estás na cozinha. O silêncio é pesado.';
  } else if (currentRoom === ROOM.COZINHA && overlap(player, doorToSalaFromCozinha) && player.y + player.h > canvas.height - 20) {
    currentRoom = ROOM.SALA;
    player.y = 40;
    msgEl.textContent = 'Voltaste à sala. O PC continua ligado.';
  }

  if (currentRoom === ROOM.SALA && overlap(player, doorToQuarto) && player.y + player.h > canvas.height - 20) {
    currentRoom = ROOM.QUARTO;
    player.y = 40;
    msgEl.textContent = 'Estás no quarto. Há uma cama e um armário.';
  } else if (currentRoom === ROOM.QUARTO && overlap(player, doorToSalaFromQuarto) && player.y < 20) {
    currentRoom = ROOM.SALA;
    player.y = canvas.height - 40;
    msgEl.textContent = 'Voltaste à sala.';
  }

  // Interações
  if (keys['e']) {
    if (state === 'normal') {
      if (currentRoom === ROOM.SALA && overlap(player, pcDesk)) {
        msgEl.textContent = 'Mexes no PC: mensagens, jogos, chamadas… mas algo não parece certo.';
      }
    } else if (state === 'chase') {
      if (currentRoom === ROOM.QUARTO) {
        if (overlap(player, wardrobe)) {
          resolveHiding('armario');
        } else if (overlap(player, bed)) {
          resolveHiding('cama');
        }
      }
    }
  }
}

function startKnock() {
  state = 'knock';
  msgEl.innerHTML = 'Um som seco ecoa pela casa.<br>Alguém bate à porta.';
  // Força o jogador a ir para o quarto (tu decides, mas aqui é “lore”)
  setTimeout(() => {
    msgEl.innerHTML += '<br>Instintivamente, decides ir para o quarto.';
    currentRoom = ROOM.QUARTO;
    player.x = 200;
    player.y = 250;
    startChase();
  }, 2000);
}

function startChase() {
  state = 'chase';
  enemyActive = true;
  enemy.x = 340;
  enemy.y = 20;
  msgEl.innerHTML = 'Os passos entram em casa. Tens poucos segundos para te esconder.<br><span class="highlight">Esconde-te no armário ou debaixo da cama (E).</span>';
}

function moveEnemy() {
  if (currentRoom !== ROOM.QUARTO) return;
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const len = Math.hypot(dx, dy) || 1;
  enemy.x += (dx / len) * enemy.speed;
  enemy.y += (dy / len) * enemy.speed;

  if (overlap(player, enemy)) {
    resolveCaught();
  }
}

function resolveHiding(local) {
  state = 'result';
  enemyActive = false;
  if (local === 'armario') {
    msgEl.innerHTML =
      'Fechas-te dentro do armário, a respiração presa.\n' +
      'Os passos aproximam-se, param mesmo à frente da porta do quarto…\n' +
      'A maçaneta mexe, mas não abre.\n' +
      '<span class="safe">Sobrevives. A noite recomece.</span>';
  } else {
    msgEl.innerHTML =
      'Atiras-te para debaixo da cama.\n' +
      'Vês apenas pés imóveis ao lado da cama.\n' +
      'A colcha levanta devagar.\n' +
      '<span class="highlight">Foste encontrado. A noite repete.</span>';
  }
  setTimeout(() => resetNight(msgEl.innerHTML), 3500);
}

function resolveCaught() {
  state = 'result';
  enemyActive = false;
  msgEl.innerHTML =
    'Não tiveste tempo de te esconder.\n' +
    '<span class="highlight">Ele encontrou-te. A noite repete.</span>';
  setTimeout(() => resetNight(msgEl.innerHTML), 3000);
}

function overlap(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function drawRoom() {
  ctx.fillStyle = '#11131a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // paredes
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 4;
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);

  ctx.fillStyle = '#888';
  ctx.font = '14px Arial';
  ctx.fillText(
    currentRoom === ROOM.SALA ? 'Sala' :
    currentRoom === ROOM.COZINHA ? 'Cozinha' : 'Quarto',
    20, 26
  );

  if (currentRoom === ROOM.SALA) {
    // PC
    ctx.fillStyle = '#222';
    ctx.fillRect(pcDesk.x, pcDesk.y, pcDesk.w, pcDesk.h);
    ctx.fillStyle = '#0af';
    ctx.fillRect(pcDesk.x + 8, pcDesk.y + 6, pcDesk.w - 16, pcDesk.h - 16);
    ctx.fillStyle = '#ccc';
    ctx.fillText('PC', pcDesk.x + 24, pcDesk.y + 26);

    // porta de entrada
    ctx.fillStyle = '#663300';
    ctx.fillRect(door.x, door.y, door.w, door.h);
    ctx.fillStyle = '#222';
    ctx.fillText('Porta', door.x - 4, door.y - 6);

    // portas para outras divisões (linhas)
    ctx.fillStyle = '#555';
    ctx.fillRect(doorToCozinha.x, doorToCozinha.y, doorToCozinha.w, doorToCozinha.h);
    ctx.fillRect(doorToQuarto.x, doorToQuarto.y, doorToQuarto.w, doorToQuarto.h);
  } else if (currentRoom === ROOM.COZINHA) {
    ctx.fillStyle = '#444';
    ctx.fillRect(80, 60, 120, 40); // balcão
    ctx.fillStyle = '#999';
    ctx.fillText('Balcão', 90, 85);
    ctx.fillStyle = '#555';
    ctx.fillRect(doorToSalaFromCozinha.x, doorToSalaFromCozinha.y, doorToSalaFromCozinha.w, doorToSalaFromCozinha.h);
  } else if (currentRoom === ROOM.QUARTO) {
    // cama
    ctx.fillStyle = '#444';
    ctx.fillRect(bed.x, bed.y, bed.w, bed.h);
    ctx.fillStyle = '#bbb';
    ctx.fillText('Cama', bed.x + 40, bed.y + 26);

    // armário
    ctx.fillStyle = '#553311';
    ctx.fillRect(wardrobe.x, wardrobe.y, wardrobe.w, wardrobe.h);
    ctx.fillStyle = '#ddd';
    ctx.fillText('Armário', wardrobe.x - 4, wardrobe.y - 6);

    ctx.fillStyle = '#555';
    ctx.fillRect(doorToSalaFromQuarto.x, doorToSalaFromQuarto.y, doorToSalaFromQuarto.w, doorToSalaFromQuarto.h);
  }
}

function drawPlayer() {
  ctx.fillStyle = '#0f0';
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawEnemy() {
  if (!enemyActive || currentRoom !== ROOM.QUARTO) return;
  ctx.fillStyle = '#f00';
  ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
}

function loop() {
  update();
  drawRoom();
  drawPlayer();
  drawEnemy();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
